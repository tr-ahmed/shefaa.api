name: Deploy to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Shefaa.slnx

      - name: Build
        run: dotnet build Shefaa.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/Shefaa.Api/Shefaa.Api.csproj --configuration Release --output ./publish -r win-x86 --self-contained false

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: site80073.siteasp.net
          username: site80073
          password: 6Wd!f8=S9_Po
          port: 21
          local-dir: ./publish/
          server-dir: /
          dangerous-clean-slate: true
