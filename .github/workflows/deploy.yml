name: Deploy to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Shefaa.slnx

      - name: Build
        run: dotnet build Shefaa.slnx --configuration Release --no-restore

      - name: Publish (framework-dependent)
        run: dotnet publish src/Shefaa.Api/Shefaa.Api.csproj --configuration Release --output ./publish

      - name: Rewrite web.config (no BOM)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "./publish/logs" | Out-Null
          $webConfig = @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified" />
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\Shefaa.Api.dll" stdoutLogEnabled="true" stdoutLogFile=".\logs\stdout.txt" hostingModel="outOfProcess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" />
                    <environmentVariable name="ASPNETCORE_URLS" value="http://localhost:5000" />
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          "@
          [System.IO.File]::WriteAllText("./publish/web.config", $webConfig, [System.Text.UTF8Encoding]::new($false))

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: site80073.siteasp.net
          username: site80073
          password: 6Wd!f8=S9_Po
          port: 21
          local-dir: ./publish/
          server-dir: /
          dangerous-clean-slate: true
