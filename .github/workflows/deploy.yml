name: Deploy to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Shefaa.slnx

      - name: Build
        run: dotnet build Shefaa.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/Shefaa.Api/Shefaa.Api.csproj --configuration Release --output ./publish

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.MONSTERASP_WEBSITE_NAME }}
          server-computer-name: ${{ secrets.MONSTERASP_SERVER_URL }}
          server-username: ${{ secrets.MONSTERASP_USERNAME }}
          server-password: ${{ secrets.MONSTERASP_PASSWORD }}
          source-folder: ./publish
          destination-folder: wwwroot
