name: Deploy to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Shefaa.slnx

      - name: Build
        run: dotnet build Shefaa.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/Shefaa.Api/Shefaa.Api.csproj --configuration Release --output ./publish

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: site80062.siteasp.net
          username: site80062
          password: 2g-Q+Zi96j%R
          port: 21
          local-dir: ./publish
          server-dir: /wwwroot
          dangerous-clean-skip: true
